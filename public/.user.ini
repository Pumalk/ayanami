; Файл .user.ini для проекта Ayanami
; Настройки загрузки файлов
upload_max_filesize = 8M
post_max_size = 8M
max_file_uploads = 20

; Настройки для отладки на этапе разработки
display_errors = On
display_startup_errors = On
error_reporting = E_ALL

; Настройки для корректного отображения содержимого на русском языке
default_charset = "UTF-8"

; Время жизни сессии (8 часов)
session.gc_maxlifetime = 28800
session.cookie_lifetime = 28800